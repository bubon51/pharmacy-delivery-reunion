<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Icône pour Pharmacy Delivery Réunion -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#17a2b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d6efd;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fond circulaire -->
  <circle cx="256" cy="256" r="240" fill="url(#grad1)" />
  
  <!-- Croix médicale (pharmacie) -->
  <path d="M256 128 L256 384 M128 256 L384 256" 
        stroke="white" stroke-width="40" stroke-linecap="round" />
  
  <!-- Camion de livraison -->
  <rect x="200" y="320" width="112" height="64" rx="16" fill="white" />
  <circle cx="220" cy="376" r="16" fill="#212529" />
  <circle cx="300" cy="376" r="16" fill="#212529" />
  
  <!-- Boîte de médicaments -->
  <rect x="230" y="200" width="52" height="40" rx="8" fill="white" />
  <path d="M230 200 L256 180 L282 200" stroke="#17a2b8" stroke-width="4" fill="none" />
  
  <!-- Texte "PD" (Pharmacy Delivery) -->
  <text x="256" y="450" font-family="Arial, sans-serif" font-size="48" font-weight="bold" 
        fill="white" text-anchor="middle">PD</text>
</svg>
