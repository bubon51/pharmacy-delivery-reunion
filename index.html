<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy Delivery Réunion - Base d'adresses fiable</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Correction pour les icônes Leaflet -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.css" />
    <style>
        .leaflet-container { background: #fff; }
        .leaflet-marker-icon, .leaflet-marker-shadow { display: block; }
        /* Style pour les suggestions d'adresses proches */
        .closest-address-suggestion { background-color: #fff3cd; border-left: 4px solid #ffc107; }
        .local-db-suggestion { background-color: #d1ecf1; border-left: 4px solid #17a2b8; }
    </style>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
        }
        .sidebar {
            background-color: #f0f2f5;
            height: 100vh;
            overflow-y: auto;
            border-right: 1px solid #dee2e6;
        }
        .map-container {
            padding: 0;
            position: relative;
        }
        #map {
            height: calc(100vh - 60px);
            width: 100%;
        }
        .route-steps {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-height: 300px;
            overflow-y: auto;
        }
        .order-card {
            margin-bottom: 10px;
            border-left: 4px solid #0d6efd;
            cursor: pointer;
        }
        .order-card.urgent {
            border-left-color: #dc3545;
        }
        .order-card .card-body {
            padding: 10px;
        }
        #addressSuggestions .list-group-item {
            cursor: pointer;
            padding: 8px 15px;
            font-size: 0.9rem;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        #addressSuggestions .list-group-item:hover {
            background-color: #f8f9fa;
        }
        .btn-waze {
            background-color: #0073ff;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .btn-waze:hover {
            background-color: #0056d3;
        }
        .step-item {
            padding: 8px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .step-number {
            background-color: #0d6efd;
            color: white;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
            margin-right: 10px;
        }
        @media (max-width: 768px) {
            .sidebar { height: auto; }
            #map { height: 400px; }
            .route-steps { position: relative; margin-top: 20px; }
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Barre latérale -->
            <div class="col-md-4 sidebar">
                <h1 class="text-center my-4">
                    <i class="fas fa-truck-medical"></i> Pharmacy Delivery Réunion
                </h1>
                <div class="card mb-4">
                    <div class="card-header bg-primary text-white">
                        <h5><i class="fas fa-plus"></i> Ajouter une commande</h5>
                    </div>
                    <div class="card-body">
                        <form id="addOrderForm">
                            <div class="mb-3">
                                <label for="customerName" class="form-label">Nom du client</label>
                                <input type="text" class="form-control" id="customerName" required>
                            </div>
                            <div class="mb-3">
                                <label for="address" class="form-label">Adresse</label>
                                <input type="text" class="form-control" id="address" required placeholder="Ex: 12 Rue de Paris, Saint-Denis">
                                <div id="addressSuggestions" class="list-group mt-2" style="display: none;"></div>
                            </div>
                            <div class="mb-3">
                                <label for="phone" class="form-label">Téléphone (optionnel)</label>
                                <input type="tel" class="form-control" id="phone">
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="priority">
                                <label class="form-check-label" for="priority">Commande urgente</label>
                            </div>
                            <button type="submit" class="btn btn-success w-100">
                                <i class="fas fa-save"></i> Ajouter
                            </button>
                        </form>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                        <h5><i class="fas fa-list"></i> Commandes en attente</h5>
                        <button id="optimizeRouteBtn" class="btn btn-sm btn-light">
                            <i class="fas fa-route"></i> Optimiser la tournée
                        </button>
                    </div>
                    <div class="card-body">
                        <div id="ordersList"></div>
                    </div>
                </div>
            </div>

            <!-- Carte -->
            <div class="col-md-8 map-container">
                <div id="map"></div>
                <div id="routeSteps" class="route-steps">
                    <h5><i class="fas fa-map-marked-alt"></i> Itinéraire optimisé</h5>
                    <div id="stepsList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal pour les erreurs -->
    <div class="modal fade" id="errorModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">Erreur</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="errorMessage"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal pour les adresses proches -->
    <div class="modal fade" id="closestAddressModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-warning text-dark">
                    <h5 class="modal-title">Adresse non trouvée</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>L'adresse exacte n'a pas été trouvée. Voici des suggestions proches :</p>
                    <div id="closestAddressOptions" class="list-group"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ======================
        // BASE DE DONNÉES LOCALE POUR LA RÉUNION
        // ======================
        // Liste complète des communes et quartiers de La Réunion avec coordonnées GPS
        const localAddressDatabase = [
            // Saint-Denis
            { name: "12 Rue de Paris, Saint-Denis", lat: -20.8785, lng: 55.4484 },
            { name: "45 Rue du Général de Gaulle, Sainte-Clotilde", lat: -20.8954, lng: 55.4592 },
            { name: "78 Boulevard de la République, Saint-Denis", lat: -20.8806, lng: 55.4521 },
            { name: "23 Rue de la République, Saint-Denis", lat: -20.8812, lng: 55.4508 },
            { name: "15 Rue Jean Chatel, Saint-Denis", lat: -20.8756, lng: 55.4453 },
            { name: "32 Avenue de la Victoire, Saint-Denis", lat: -20.8798, lng: 55.4495 },

            // Saint-Paul
            { name: "10 Rue de la Marine, Saint-Paul", lat: -20.9953, lng: 55.2841 },
            { name: "5 Rue de Paris, Saint-Paul", lat: -20.9968, lng: 55.2856 },
            { name: "20 Rue du Général Lambert, Saint-Paul", lat: -20.9932, lng: 55.2825 },
            { name: "15 Rue des Bons Enfants, Saint-Paul", lat: -20.9975, lng: 55.2863 },

            // Saint-Pierre
            { name: "10 Rue de Paris, Saint-Pierre", lat: -21.3408, lng: 55.4769 },
            { name: "25 Rue du Général de Gaulle, Saint-Pierre", lat: -21.3423, lng: 55.4784 },
            { name: "5 Avenue de la République, Saint-Pierre", lat: -21.3415, lng: 55.4778 },
            { name: "12 Rue du Commerce, Saint-Pierre", lat: -21.3431, lng: 55.4792 },

            // Le Tampon
            { name: "15 Rue de la République, Le Tampon", lat: -21.2656, lng: 55.5139 },
            { name: "22 Rue du Général de Gaulle, Le Tampon", lat: -21.2678, lng: 55.5152 },
            { name: "8 Rue de Paris, Le Tampon", lat: -21.2645, lng: 55.5128 },

            // Saint-Suzanne (où se trouve la pharmacie)
            { name: "133 Avenue du Mahatma Gandhi, Saint-Suzanne", lat: -20.932179057032947, lng: 55.64139511027464 },
            { name: "25 Rue de la République, Saint-Suzanne", lat: -20.9305, lng: 55.6432 },
            { name: "10 Rue de Paris, Saint-Suzanne", lat: -20.9318, lng: 55.6425 },
            { name: "18 Rue du Général de Gaulle, Saint-Suzanne", lat: -20.9335, lng: 55.6408 },

            // Saint-André
            { name: "12 Rue de la République, Saint-André", lat: -20.9654, lng: 55.6541 },
            { name: "20 Rue du Général de Gaulle, Saint-André", lat: -20.9672, lng: 55.6558 },

            // Saint-Louis
            { name: "15 Rue de Paris, Saint-Louis", lat: -21.2856, lng: 55.4235 },
            { name: "8 Rue du Commerce, Saint-Louis", lat: -21.2872, lng: 55.4251 },

            // Saint-Leu
            { name: "10 Rue de la Marine, Saint-Leu", lat: -21.1669, lng: 55.1536 },
            { name: "25 Rue du Général Lambert, Saint-Leu", lat: -21.1685, lng: 55.1552 },

            // Les Avirons
            { name: "12 Rue de la République, Les Avirons", lat: -21.2456, lng: 55.3247 },
            { name: "18 Rue du Général de Gaulle, Les Avirons", lat: -21.2478, lng: 55.3263 },

            // L'Étang-Salé
            { name: "10 Rue de Paris, L'Étang-Salé", lat: -21.2654, lng: 55.3421 },
            { name: "15 Rue du Commerce, L'Étang-Salé", lat: -21.2672, lng: 55.3438 },

            // Sainte-Marie
            { name: "20 Rue de la République, Sainte-Marie", lat: -20.9056, lng: 55.5847 },
            { name: "12 Rue du Général de Gaulle, Sainte-Marie", lat: -20.9078, lng: 55.5863 },

            // Sainte-Suzanne
            { name: "15 Rue de Paris, Sainte-Suzanne", lat: -20.8956, lng: 55.6425 },
            { name: "8 Rue du Commerce, Sainte-Suzanne", lat: -20.8972, lng: 55.6441 },

            // La Possession
            { name: "10 Rue de la République, La Possession", lat: -20.9256, lng: 55.3347 },
            { name: "25 Rue du Général de Gaulle, La Possession", lat: -20.9278, lng: 55.3363 },

            // Le Port
            { name: "12 Rue de Paris, Le Port", lat: -20.9356, lng: 55.2947 },
            { name: "18 Rue du Commerce, Le Port", lat: -20.9378, lng: 55.2963 },

            // Saint-Joseph
            { name: "10 Rue de la République, Saint-Joseph", lat: -21.3654, lng: 55.6047 },
            { name: "15 Rue du Général de Gaulle, Saint-Joseph", lat: -21.3672, lng: 55.6063 },

            // Petite-Île
            { name: "12 Rue de Paris, Petite-Île", lat: -21.3256, lng: 55.5647 },
            { name: "8 Rue du Commerce, Petite-Île", lat: -21.3278, lng: 55.5663 },

            // Cilaos
            { name: "15 Rue de la République, Cilaos", lat: -21.1356, lng: 55.4547 },
            { name: "10 Rue du Général de Gaulle, Cilaos", lat: -21.1378, lng: 55.4563 },

            // Entre-Deux
            { name: "12 Rue de Paris, Entre-Deux", lat: -21.2456, lng: 55.4847 },
            { name: "18 Rue du Commerce, Entre-Deux", lat: -21.2478, lng: 55.4863 },

            // Saint-Benoît
            { name: "10 Rue de la République, Saint-Benoît", lat: -21.0456, lng: 55.7247 },
            { name: "15 Rue du Général de Gaulle, Saint-Benoît", lat: -21.0478, lng: 55.7263 },

            // Saint-Rose
            { name: "12 Rue de Paris, Saint-Rose", lat: -21.1256, lng: 55.7847 },
            { name: "20 Rue du Commerce, Saint-Rose", lat: -21.1278, lng: 55.7863 },

            // La Plaine-des-Palmistes
            { name: "15 Rue de la République, La Plaine-des-Palmistes", lat: -21.1056, lng: 55.5847 },
            { name: "10 Rue du Général de Gaulle, La Plaine-des-Palmistes", lat: -21.1078, lng: 55.5863 }
        ];

        // ======================
        // DONNÉES GLOBALES
        // ======================
        const pharmacy = {
            name: "Pharmacie de l'Océan Indien",
            address: "133 avenue du Mahatma Gandhi, 97441 Saint-Suzanne",
            lat: -20.932179057032947,
            lng: 55.64139511027464
        };

        let map;
        let markers = [];
        let polyline;
        let orders = JSON.parse(localStorage.getItem('orders')) || [];
        let pendingClosestAddress = null;

        // ======================
        // FONCTIONS DE RECHERCHE
        // ======================

        // Recherche dans Nominatim (OpenStreetMap)
        async function searchInNominatim(query) {
            if (!query || query.length < 3) return [];

            try {
                const response = await fetch(
                    `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)},La Réunion&limit=5&bounded=1&viewbox=-21.4,-55.9,-20.8,-55.2`
                );
                if (!response.ok) throw new Error(`Erreur HTTP : ${response.status}`);
                const data = await response.json();
                return data.map(item => ({
                    address: item.display_name,
                    lat: parseFloat(item.lat),
                    lng: parseFloat(item.lon),
                    source: "Nominatim"
                }));
            } catch (error) {
                console.error("Erreur Nominatim:", error);
                return [];
            }
        }

        // Recherche dans la base locale
        function searchInLocalDatabase(query) {
            if (!query || query.length < 2) return [];

            const queryLower = query.toLowerCase();
            return localAddressDatabase
                .filter(addr => addr.name.toLowerCase().includes(queryLower))
                .map(addr => ({
                    ...addr,
                    source: "Base locale"
                }));
        }

        // Recherche combinée (Nominatim + Base locale)
        async function searchAddress(query) {
            const [nominatimResults, localResults] = await Promise.all([
                searchInNominatim(query),
                searchInLocalDatabase(query)
            ]);

            // Combiner les résultats (Nominatim en premier, puis base locale)
            return [...nominatimResults, ...localResults];
        }

        // Trouver l'adresse la plus proche parmi une liste
        function findClosestFromList(targetLat, targetLng, addressList) {
            if (addressList.length === 0) return null;

            let closest = null;
            let minDistance = Infinity;

            addressList.forEach(addr => {
                const distance = Math.sqrt(
                    Math.pow(addr.lat - targetLat, 2) +
                    Math.pow(addr.lng - targetLng, 2)
                );
                if (distance < minDistance) {
                    minDistance = distance;
                    closest = addr;
                }
            });

            return closest;
        }

        // Trouver l'adresse la plus proche parmi les commandes existantes
        function findClosestFromOrders(targetLat, targetLng) {
            return findClosestFromList(targetLat, targetLng, orders);
        }

        // ======================
        // FONCTIONS DE CARTE
        // ======================
        function initMap() {
            if (map) return;

            map = L.map('map').setView([pharmacy.lat, pharmacy.lng], 15);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                maxZoom: 18
            }).addTo(map);

            // Correction pour les icônes Leaflet
            delete L.Icon.Default.prototype._getIconUrl;
            L.Icon.Default.mergeOptions({
                iconRetinaUrl: 'https://unpkg.com/leaflet@1.7.1/dist/images/marker-icon-2x.png',
                iconUrl: 'https://unpkg.com/leaflet@1.7.1/dist/images/marker-icon.png',
                shadowUrl: 'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png'
            });

            // Icône personnalisée pour la pharmacie
            const pharmacyIcon = L.icon({
                iconUrl: 'https://cdn-icons-png.flaticon.com/512/1087/1087915.png',
                iconSize: [32, 32],
                iconAnchor: [16, 32],
                popupAnchor: [0, -32]
            });

            L.marker([pharmacy.lat, pharmacy.lng], { icon: pharmacyIcon })
                .addTo(map)
                .bindPopup(`<b>${pharmacy.name}</b><br>${pharmacy.address}`);

            markers.push(L.marker([pharmacy.lat, pharmacy.lng], { icon: pharmacyIcon }));
        }

        function updateMap() {
            if (!map) {
                console.error("La carte n'est pas initialisée.");
                return;
            }

            // Effacer tous les marqueurs sauf la pharmacie
            markers.slice(1).forEach(marker => {
                if (map.hasLayer(marker)) map.removeLayer(marker);
            });
            markers = markers.slice(0, 1);

            // Ajouter les marqueurs des commandes
            orders.forEach((order, index) => {
                const marker = L.marker([order.lat, order.lng])
                    .addTo(map)
                    .bindPopup(`
                        <b>${index+1}. ${order.customerName}</b><br>
                        ${order.address}<br>
                        <button onclick="openWaze(${order.lat}, ${order.lng})" class="btn-waze mt-2">
                            <i class="fas fa-directions"></i> Naviguer avec Waze
                        </button>
                    `);
                markers.push(marker);
            });

            // Dessiner l'itinéraire
            if (orders.length > 0) {
                if (polyline && map.hasLayer(polyline)) map.removeLayer(polyline);

                const routePoints = [
                    [pharmacy.lat, pharmacy.lng],
                    ...orders.map(o => [o.lat, o.lng])
                ];

                polyline = L.polyline(routePoints, {
                    color: 'blue',
                    weight: 5,
                    opacity: 0.7
                }).addTo(map);

                map.fitBounds(routePoints);
            } else {
                map.setView([pharmacy.lat, pharmacy.lng], 15);
            }
        }

        // ======================
        // FONCTIONS D'INTERFACE
        // ======================
        function renderOrders() {
            const container = document.getElementById('ordersList');
            if (!container) return;

            container.innerHTML = orders.length === 0
                ? '<div class="text-center text-muted py-3">Aucune commande en attente</div>'
                : orders.map((order, index) => {
                    const escapedName = order.customerName.replace(/'/g, "\\'");
                    return `
                        <div class="card order-card ${order.priority ? 'urgent' : ''} mb-2">
                            <div class="card-body">
                                <h5 class="card-title">${order.customerName}</h5>
                                <p class="card-text">${order.address}</p>
                                <div class="d-flex justify-content-between align-items-center">
                                    <small class="text-muted">
                                        ${order.status === 'pending' ? 'En attente' :
                                          order.status === 'in_progress' ? 'En cours' : 'Livrée'}
                                    </small>
                                    <div>
                                        ${order.status === 'pending' ?
                                            `<button class="btn btn-sm btn-outline-primary me-2" onclick="updateStatus('${order.id}', 'in_progress')">
                                                <i class="fas fa-play"></i> Démarrer
                                            </button>` : ''}
                                        ${order.status === 'in_progress' ?
                                            `<button class="btn btn-sm btn-outline-success me-2" onclick="updateStatus('${order.id}', 'delivered')">
                                                <i class="fas fa-check"></i> Livrée
                                            </button>` : ''}
                                        <button class="btn btn-sm btn-danger" onclick="confirmDelete('${order.id}', '${escapedName}')">
                                            <i class="fas fa-trash"></i> Supprimer
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
        }

        function renderRouteSteps() {
            const container = document.getElementById('stepsList');
            if (!container) return;

            container.innerHTML = orders.length === 0
                ? '<div class="text-center text-muted py-2">Aucune tournée optimisée</div>'
                : `
                    <div class="step-item">
                        <div class="d-flex align-items-center">
                            <div class="step-number">1</div>
                            <div>
                                <strong>${pharmacy.name}</strong><br>
                                <small>${pharmacy.address}</small>
                            </div>
                        </div>
                        <button class="btn-waze" onclick="openWaze(${pharmacy.lat}, ${pharmacy.lng})">
                            <i class="fas fa-directions"></i> Waze
                        </button>
                    </div>
                    ${orders.map((order, index) => {
                        const escapedName = order.customerName.replace(/'/g, "\\'");
                        return `
                            <div class="step-item">
                                <div class="d-flex align-items-center">
                                    <div class="step-number">${index + 2}</div>
                                    <div>
                                        <strong>${order.customerName}</strong><br>
                                        <small>${order.address}</small>
                                    </div>
                                </div>
                                <button class="btn-waze" onclick="openWaze(${order.lat}, ${order.lng})">
                                    <i class="fas fa-directions"></i> Waze
                                </button>
                            </div>
                        `;
                    }).join('')}
                `;
        }

        // ======================
        // FONCTIONS D'ACTIONS
        // ======================
        function addOrder(customerName, address, lat, lng, phone, priority) {
            const newOrder = {
                id: Date.now().toString(),
                customerName,
                address,
                lat,
                lng,
                phone: phone || null,
                priority,
                status: 'pending'
            };
            orders.push(newOrder);
            saveOrders();
            renderOrders();
            updateMap();
        }

        function updateStatus(orderId, newStatus) {
            orders = orders.map(order =>
                order.id === orderId ? { ...order, status: newStatus } : order
            );
            saveOrders();
            renderOrders();
        }

        function confirmDelete(orderId, customerName) {
            if (confirm(`Êtes-vous sûr de vouloir supprimer la commande de ${customerName} ?`)) {
                orders = orders.filter(order => order.id !== orderId);
                saveOrders();
                renderOrders();
                updateMap();
            }
        }

        function optimizeRoute() {
            if (orders.length === 0) {
                showError("Aucune commande à optimiser.");
                return;
            }

            // Algorithme du plus proche voisin
            const route = [];
            let currentLat = pharmacy.lat;
            let currentLng = pharmacy.lng;
            const remaining = [...orders];

            while (remaining.length > 0) {
                let nearestIndex = 0;
                let minDistance = Infinity;

                remaining.forEach((order, index) => {
                    const distance = Math.sqrt(
                        Math.pow(order.lat - currentLat, 2) +
                        Math.pow(order.lng - currentLng, 2)
                    );
                    if (distance < minDistance) {
                        minDistance = distance;
                        nearestIndex = index;
                    }
                });

                if (nearestIndex !== -1) {
                    route.push(remaining[nearestIndex]);
                    currentLat = remaining[nearestIndex].lat;
                    currentLng = remaining[nearestIndex].lng;
                    remaining.splice(nearestIndex, 1);
                } else {
                    route.push(remaining[0]);
                    remaining.shift();
                }
            }

            orders = route;
            saveOrders();
            renderOrders();
            updateMap();
            renderRouteSteps();
        }

        function openWaze(lat, lng) {
            window.open(`https://www.waze.com/ul?ll=${lat},${lng}&navigate=yes`, '_blank');
        }

        function saveOrders() {
            try {
                localStorage.setItem('orders', JSON.stringify(orders));
            } catch (e) {
                console.error("Erreur lors de la sauvegarde des commandes :", e);
            }
        }

        function showError(message) {
            const modalEl = document.getElementById('errorModal');
            if (!modalEl) return;
            const modal = new bootstrap.Modal(modalEl);
            document.getElementById('errorMessage').textContent = message;
            modal.show();
        }

        // Afficher les adresses proches dans une modal
        function showClosestAddresses(suggestions, originalQuery) {
            const modalEl = document.getElementById('closestAddressModal');
            if (!modalEl) return;

            const modal = new bootstrap.Modal(modalEl);
            const optionsContainer = document.getElementById('closestAddressOptions');

            if (suggestions.length === 0) {
                optionsContainer.innerHTML = '<div class="alert alert-warning">Aucune adresse proche trouvée.</div>';
                modal.show();
                return;
            }

            // Trier les suggestions par distance (la plus proche en premier)
            suggestions.sort((a, b) => {
                const distA = Math.sqrt(
                    Math.pow(a.lat - pharmacy.lat, 2) +
                    Math.pow(a.lng - pharmacy.lng, 2)
                );
                const distB = Math.sqrt(
                    Math.pow(b.lat - pharmacy.lat, 2) +
                    Math.pow(b.lng - pharmacy.lng, 2)
                );
                return distA - distB;
            });

            optionsContainer.innerHTML = suggestions.map((suggestion, index) => `
                <div class="list-group-item ${suggestion.source === 'Base locale' ? 'local-db-suggestion' : 'closest-address-suggestion'}"
                     onclick="selectClosestAddress(${index})">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <strong>${suggestion.name || suggestion.address}</strong>
                            <small class="d-block text-muted">${suggestion.source}</small>
                        </div>
                        <i class="fas fa-map-marker-alt text-primary"></i>
                    </div>
                </div>
            `).join('');

            // Stocker les suggestions et la requête originale
            pendingClosestAddress = {
                suggestions: suggestions,
                originalQuery: originalQuery
            };

            modal.show();
        }

        // Sélectionner une adresse proche
        function selectClosestAddress(index) {
            if (!pendingClosestAddress || !pendingClosestAddress.suggestions[index]) {
                return;
            }

            const selected = pendingClosestAddress.suggestions[index];
            document.getElementById('address').value = selected.name || selected.address;
            document.getElementById('addressSuggestions').style.display = 'none';

            // Ajouter la commande avec les coordonnées de l'adresse sélectionnée
            const customerName = document.getElementById('customerName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const priority = document.getElementById('priority').checked ? 1 : 0;

            if (!customerName) {
                showError("Veuillez indiquer un nom de client.");
                return;
            }

            addOrder(
                customerName,
                selected.name || selected.address,
                selected.lat,
                selected.lng,
                phone,
                priority
            );

            document.getElementById('addOrderForm').reset();

            // Fermer la modal
            const modalEl = document.getElementById('closestAddressModal');
            if (modalEl) {
                const modal = bootstrap.Modal.getInstance(modalEl);
                modal.hide();
            }
        }

        function selectAddress(address, lat, lng) {
            document.getElementById('address').value = address;
            document.getElementById('addressSuggestions').style.display = 'none';
        }

        // ======================
        // INITIALISATION
        // ======================
        document.addEventListener('DOMContentLoaded', () => {
            initMap();
            renderOrders();

            // Formulaire d'ajout de commande
            const addOrderForm = document.getElementById('addOrderForm');
            if (!addOrderForm) return;

            addOrderForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const customerName = document.getElementById('customerName').value.trim();
                const address = document.getElementById('address').value.trim();
                const phone = document.getElementById('phone').value.trim();
                const priority = document.getElementById('priority').checked ? 1 : 0;

                if (!customerName || !address) {
                    showError("Veuillez remplir tous les champs obligatoires.");
                    return;
                }

                // Rechercher dans toutes les sources
                const allSuggestions = await searchAddress(address);

                if (allSuggestions.length > 0) {
                    // Si on a des suggestions exactes, utiliser la première
                    const exactMatch = allSuggestions.find(s =>
                        s.address.toLowerCase() === address.toLowerCase() ||
                        s.name.toLowerCase() === address.toLowerCase()
                    );

                    if (exactMatch) {
                        addOrder(customerName, exactMatch.name || exactMatch.address, exactMatch.lat, exactMatch.lng, phone, priority);
                    } else {
                        // Sinon, proposer les suggestions proches
                        showClosestAddresses(allSuggestions, address);
                        return;
                    }
                } else {
                    // Si aucune suggestion, proposer les adresses proches de la pharmacie
                    const closestFromLocalDB = findClosestFromList(
                        pharmacy.lat,
                        pharmacy.lng,
                        localAddressDatabase
                    );

                    const closestFromOrders = findClosestFromOrders(pharmacy.lat, pharmacy.lng);

                    const allClosest = [];
                    if (closestFromLocalDB) allClosest.push(closestFromLocalDB);
                    if (closestFromOrders) allClosest.push(closestFromOrders);

                    if (allClosest.length > 0) {
                        showClosestAddresses(allClosest, address);
                        return;
                    } else {
                        // Dernier recours : utiliser les coordonnées de la pharmacie
                        showError("Aucune adresse proche trouvée. Utilisation des coordonnées de la pharmacie par défaut.");
                        addOrder(customerName, address, pharmacy.lat, pharmacy.lng, phone, priority);
                    }
                }

                addOrderForm.reset();
                document.getElementById('addressSuggestions').style.display = 'none';
            });

            // Autocomplétion des adresses
            const addressInput = document.getElementById('address');
            if (!addressInput) return;

            addressInput.addEventListener('input', async (e) => {
                const query = e.target.value.trim();
                if (query.length < 2) { // Seuil plus bas pour la base locale
                    document.getElementById('addressSuggestions').style.display = 'none';
                    return;
                }

                const suggestions = await searchAddress(query);
                const container = document.getElementById('addressSuggestions');

                if (!container) return;

                if (suggestions.length > 0) {
                    container.innerHTML = suggestions.map(s => {
                        const displayText = s.name || s.address;
                        const escapedText = displayText.replace(/'/g, "\\'");
                        return `
                            <div class="list-group-item ${s.source === 'Base locale' ? 'local-db-suggestion' : ''}"
                                 onclick="selectAddress('${escapedText}', ${s.lat}, ${s.lng})">
                                <div class="d-flex justify-content-between align-items-center">
                                    <span>${displayText}</span>
                                    <small class="text-muted">${s.source}</small>
                                </div>
                            </div>
                        `;
                    }).join('');
                    container.style.display = 'block';
                } else {
                    container.style.display = 'none';
                }
            });

            // Optimiser la tournée
            const optimizeBtn = document.getElementById('optimizeRouteBtn');
            if (!optimizeBtn) return;

            optimizeBtn.addEventListener('click', optimizeRoute);

            // Masquer les suggestions en cliquant ailleurs
            document.addEventListener('click', (e) => {
                const addressSuggestions = document.getElementById('addressSuggestions');
                if (addressSuggestions && !e.target.closest('#address') && !e.target.closest('#addressSuggestions')) {
                    addressSuggestions.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
