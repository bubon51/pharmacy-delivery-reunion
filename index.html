<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy Delivery Réunion - Pharmacie de l'Océan Indien</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Correction pour les icônes Leaflet -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.css" />
    <style>
        /* Fix pour les icônes Leaflet */
        .leaflet-container {
            background: #fff;
        }
        .leaflet-marker-icon, .leaflet-marker-shadow {
            display: block;
        }
    </style>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
        }
        .sidebar {
            background-color: #f0f2f5;
            height: 100vh;
            overflow-y: auto;
            border-right: 1px solid #dee2e6;
        }
        .map-container {
            padding: 0;
            position: relative;
        }
        #map {
            height: calc(100vh - 60px);
            width: 100%;
        }
        .route-steps {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-height: 300px;
            overflow-y: auto;
        }
        .order-card {
            margin-bottom: 10px;
            border-left: 4px solid #0d6efd;
            cursor: pointer;
        }
        .order-card.urgent {
            border-left-color: #dc3545;
        }
        .order-card .card-body {
            padding: 10px;
        }
        #addressSuggestions .list-group-item {
            cursor: pointer;
            padding: 8px 15px;
            font-size: 0.9rem;
        }
        #addressSuggestions .list-group-item:hover {
            background-color: #f8f9fa;
        }
        .btn-waze {
            background-color: #0073ff;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .btn-waze:hover {
            background-color: #0056d3;
        }
        .step-item {
            padding: 8px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .step-number {
            background-color: #0d6efd;
            color: white;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
            margin-right: 10px;
        }
        @media (max-width: 768px) {
            .sidebar {
                height: auto;
            }
            #map {
                height: 400px;
            }
            .route-steps {
                position: relative;
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Barre latérale -->
            <div class="col-md-4 sidebar">
                <h1 class="text-center my-4">
                    <i class="fas fa-truck-medical"></i> Pharmacy Delivery Réunion
                </h1>
                <div class="card mb-4">
                    <div class="card-header bg-primary text-white">
                        <h5><i class="fas fa-plus"></i> Ajouter une commande</h5>
                    </div>
                    <div class="card-body">
                        <form id="addOrderForm">
                            <div class="mb-3">
                                <label for="customerName" class="form-label">Nom du client</label>
                                <input type="text" class="form-control" id="customerName" required>
                            </div>
                            <div class="mb-3">
                                <label for="address" class="form-label">Adresse</label>
                                <input type="text" class="form-control" id="address" required>
                                <div id="addressSuggestions" class="list-group mt-2" style="display: none;"></div>
                            </div>
                            <div class="mb-3">
                                <label for="phone" class="form-label">Téléphone (optionnel)</label>
                                <input type="tel" class="form-control" id="phone">
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="priority">
                                <label class="form-check-label" for="priority">Commande urgente</label>
                            </div>
                            <button type="submit" class="btn btn-success w-100">
                                <i class="fas fa-save"></i> Ajouter
                            </button>
                        </form>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                        <h5><i class="fas fa-list"></i> Commandes en attente</h5>
                        <button id="optimizeRouteBtn" class="btn btn-sm btn-light">
                            <i class="fas fa-route"></i> Optimiser la tournée
                        </button>
                    </div>
                    <div class="card-body">
                        <div id="ordersList"></div>
                    </div>
                </div>
            </div>

            <!-- Carte -->
            <div class="col-md-8 map-container">
                <div id="map"></div>
                <div id="routeSteps" class="route-steps">
                    <h5><i class="fas fa-map-marked-alt"></i> Itinéraire optimisé</h5>
                    <div id="stepsList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal pour les erreurs -->
    <div class="modal fade" id="errorModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">Erreur</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="errorMessage"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ===== DONNÉES GLOBALES =====
        // Pharmacie de l'Océan Indien (Saint-Suzanne) - Coordonnées GPS exactes
        const pharmacy = {
            name: "Pharmacie de l'Océan Indien",
            address: "133 avenue du Mahatma Gandhi, 97441 Saint-Suzanne",
            lat: -20.932179057032947,
            lng: 55.64139511027464
        };

        // Variables globales pour la carte
        let map;
        let markers = [];
        let polyline;
        let orders = JSON.parse(localStorage.getItem('orders')) || [];

        // ===== FONCTIONS DE BASE =====
        // Sauvegarder les commandes dans localStorage
        function saveOrders() {
            try {
                localStorage.setItem('orders', JSON.stringify(orders));
            } catch (e) {
                console.error("Erreur lors de la sauvegarde des commandes :", e);
            }
        }

        // Rechercher une adresse via Nominatim (OpenStreetMap)
        async function searchAddress(query) {
            if (!query || query.length < 3) return [];

            try {
                const response = await fetch(
                    `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)},La Réunion&limit=5`
                );
                if (!response.ok) {
                    throw new Error(`Erreur HTTP : ${response.status}`);
                }
                const data = await response.json();
                return data.map(item => ({
                    address: item.display_name,
                    lat: parseFloat(item.lat),
                    lng: parseFloat(item.lon)
                }));
            } catch (error) {
                console.error("Erreur lors de la recherche d'adresses :", error);
                return [];
            }
        }

        // ===== CARTE =====
        // Initialiser la carte
        function initMap() {
            if (map) return; // Éviter l'initialisation multiple

            // Centrer sur la pharmacie avec les coordonnées exactes
            map = L.map('map').setView([pharmacy.lat, pharmacy.lng], 15);

            // Ajouter les tuiles OpenStreetMap
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                maxZoom: 18
            }).addTo(map);

            // Correction pour les icônes Leaflet
            delete L.Icon.Default.prototype._getIconUrl;
            L.Icon.Default.mergeOptions({
                iconRetinaUrl: 'https://unpkg.com/leaflet@1.7.1/dist/images/marker-icon-2x.png',
                iconUrl: 'https://unpkg.com/leaflet@1.7.1/dist/images/marker-icon.png',
                shadowUrl: 'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png'
            });

            // Ajouter un marqueur pour la pharmacie avec une icône personnalisée
            const pharmacyIcon = L.icon({
                iconUrl: 'https://cdn-icons-png.flaticon.com/512/1087/1087915.png',
                iconSize: [32, 32],
                iconAnchor: [16, 32],
                popupAnchor: [0, -32]
            });

            L.marker([pharmacy.lat, pharmacy.lng], { icon: pharmacyIcon })
                .addTo(map)
                .bindPopup(`<b>${pharmacy.name}</b><br>${pharmacy.address}`);

            // Initialiser les marqueurs
            markers.push(L.marker([pharmacy.lat, pharmacy.lng], { icon: pharmacyIcon }));
        }

        // Mettre à jour la carte avec les commandes
        function updateMap() {
            if (!map) {
                console.error("La carte n'est pas initialisée.");
                return;
            }

            // Effacer tous les marqueurs sauf la pharmacie
            markers.slice(1).forEach(marker => {
                if (map.hasLayer(marker)) {
                    map.removeLayer(marker);
                }
            });
            markers = markers.slice(0, 1); // Garder uniquement le marqueur de la pharmacie

            // Ajouter les marqueurs des commandes
            orders.forEach((order, index) => {
                const marker = L.marker([order.lat, order.lng])
                    .addTo(map)
                    .bindPopup(`
                        <b>${index+1}. ${order.customerName}</b><br>
                        ${order.address}<br>
                        <button onclick="openWaze(${order.lat}, ${order.lng})" class="btn-waze mt-2">
                            <i class="fas fa-directions"></i> Naviguer avec Waze
                        </button>
                    `);
                markers.push(marker);
            });

            // Dessiner l'itinéraire
            if (orders.length > 0) {
                if (polyline && map.hasLayer(polyline)) {
                    map.removeLayer(polyline);
                }

                // Toujours commencer par la pharmacie
                const routePoints = [
                    [pharmacy.lat, pharmacy.lng],
                    ...orders.map(o => [o.lat, o.lng])
                ];

                polyline = L.polyline(routePoints, {
                    color: 'blue',
                    weight: 5,
                    opacity: 0.7
                }).addTo(map);

                // Ajuster la vue pour voir toute la tournée
                map.fitBounds(routePoints);
            } else {
                // Si aucune commande, recentrer sur la pharmacie
                map.setView([pharmacy.lat, pharmacy.lng], 15);
            }
        }

        // ===== INTERFACE =====
        // Afficher la liste des commandes
        function renderOrders() {
            const container = document.getElementById('ordersList');
            if (!container) {
                console.error("Le conteneur ordersList n'existe pas.");
                return;
            }

            container.innerHTML = orders.length === 0
                ? '<div class="text-center text-muted py-3">Aucune commande en attente</div>'
                : orders.map((order, index) => {
                    const escapedName = order.customerName.replace(/'/g, "\\'");
                    return `
                        <div class="card order-card ${order.priority ? 'urgent' : ''} mb-2">
                            <div class="card-body">
                                <h5 class="card-title">${order.customerName}</h5>
                                <p class="card-text">${order.address}</p>
                                <div class="d-flex justify-content-between align-items-center">
                                    <small class="text-muted">
                                        ${order.status === 'pending' ? 'En attente' :
                                          order.status === 'in_progress' ? 'En cours' : 'Livrée'}
                                    </small>
                                    <div>
                                        ${order.status === 'pending' ?
                                            `<button class="btn btn-sm btn-outline-primary me-2" onclick="updateStatus('${order.id}', 'in_progress')">
                                                <i class="fas fa-play"></i> Démarrer
                                            </button>` : ''}
                                        ${order.status === 'in_progress' ?
                                            `<button class="btn btn-sm btn-outline-success me-2" onclick="updateStatus('${order.id}', 'delivered')">
                                                <i class="fas fa-check"></i> Livrée
                                            </button>` : ''}
                                        <button class="btn btn-sm btn-danger" onclick="confirmDelete('${order.id}', '${escapedName}')">
                                            <i class="fas fa-trash"></i> Supprimer
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
        }

        // Afficher les étapes de l'itinéraire
        function renderRouteSteps() {
            const container = document.getElementById('stepsList');
            if (!container) {
                console.error("Le conteneur stepsList n'existe pas.");
                return;
            }

            container.innerHTML = orders.length === 0
                ? '<div class="text-center text-muted py-2">Aucune tournée optimisée</div>'
                : `
                    <!-- Étape 1 : Pharmacie -->
                    <div class="step-item">
                        <div class="d-flex align-items-center">
                            <div class="step-number">1</div>
                            <div>
                                <strong>${pharmacy.name}</strong><br>
                                <small>${pharmacy.address}</small>
                            </div>
                        </div>
                        <button class="btn-waze" onclick="openWaze(${pharmacy.lat}, ${pharmacy.lng})">
                            <i class="fas fa-directions"></i> Waze
                        </button>
                    </div>
                    <!-- Étapes suivantes : Commandes -->
                    ${orders.map((order, index) => {
                        const escapedName = order.customerName.replace(/'/g, "\\'");
                        return `
                            <div class="step-item">
                                <div class="d-flex align-items-center">
                                    <div class="step-number">${index + 2}</div>
                                    <div>
                                        <strong>${order.customerName}</strong><br>
                                        <small>${order.address}</small>
                                    </div>
                                </div>
                                <button class="btn-waze" onclick="openWaze(${order.lat}, ${order.lng})">
                                    <i class="fas fa-directions"></i> Waze
                                </button>
                            </div>
                        `;
                    }).join('')}
                `;
        }

        // ===== ACTIONS =====
        // Ajouter une commande
        function addOrder(customerName, address, lat, lng, phone, priority) {
            const newOrder = {
                id: Date.now().toString(),
                customerName,
                address,
                lat,
                lng,
                phone: phone || null,
                priority,
                status: 'pending'
            };
            orders.push(newOrder);
            saveOrders();
            renderOrders();
            updateMap();
        }

        // Mettre à jour le statut d'une commande
        function updateStatus(orderId, newStatus) {
            orders = orders.map(order =>
                order.id === orderId ? { ...order, status: newStatus } : order
            );
            saveOrders();
            renderOrders();
        }

        // Supprimer une commande (avec confirmation)
        function confirmDelete(orderId, customerName) {
            if (confirm(`Êtes-vous sûr de vouloir supprimer la commande de ${customerName} ?`)) {
                orders = orders.filter(order => order.id !== orderId);
                saveOrders();
                renderOrders();
                updateMap();
            }
        }

        // Optimiser la tournée (algorithme du plus proche voisin)
        function optimizeRoute() {
            if (orders.length === 0) {
                showError("Aucune commande à optimiser.");
                return;
            }

            // Algorithme du plus proche voisin
            const route = [];
            let currentLat = pharmacy.lat;
            let currentLng = pharmacy.lng;
            const remaining = [...orders];

            while (remaining.length > 0) {
                let nearestIndex = 0;
                let minDistance = Infinity;

                remaining.forEach((order, index) => {
                    const distance = Math.sqrt(
                        Math.pow(order.lat - currentLat, 2) +
                        Math.pow(order.lng - currentLng, 2)
                    );
                    if (distance < minDistance) {
                        minDistance = distance;
                        nearestIndex = index;
                    }
                });

                if (nearestIndex !== -1) {
                    route.push(remaining[nearestIndex]);
                    currentLat = remaining[nearestIndex].lat;
                    currentLng = remaining[nearestIndex].lng;
                    remaining.splice(nearestIndex, 1);
                } else {
                    // Si aucun voisin trouvé (ne devrait pas arriver), on prend le premier
                    route.push(remaining[0]);
                    remaining.shift();
                }
            }

            orders = route;
            saveOrders();
            renderOrders();
            updateMap();
            renderRouteSteps();
        }

        // Ouvrir Waze avec les coordonnées
        function openWaze(lat, lng) {
            window.open(`https://www.waze.com/ul?ll=${lat},${lng}&navigate=yes`, '_blank');
        }

        // Afficher une erreur
        function showError(message) {
            const modalEl = document.getElementById('errorModal');
            if (!modalEl) {
                console.error("Modal non trouvé :", message);
                return;
            }
            const modal = new bootstrap.Modal(modalEl);
            document.getElementById('errorMessage').textContent = message;
            modal.show();
        }

        // Sélectionner une adresse depuis les suggestions
        function selectAddress(address, lat, lng) {
            document.getElementById('address').value = address;
            document.getElementById('addressSuggestions').style.display = 'none';
        }

        // ===== INITIALISATION =====
        document.addEventListener('DOMContentLoaded', () => {
            // Initialiser la carte
            initMap();

            // Afficher les commandes existantes
            renderOrders();

            // Configurer le formulaire d'ajout
            const addOrderForm = document.getElementById('addOrderForm');
            if (!addOrderForm) {
                console.error("Formulaire addOrderForm non trouvé.");
                return;
            }

            addOrderForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const customerName = document.getElementById('customerName').value.trim();
                const address = document.getElementById('address').value.trim();
                const phone = document.getElementById('phone').value.trim();
                const priority = document.getElementById('priority').checked ? 1 : 0;

                if (!customerName || !address) {
                    showError("Veuillez remplir tous les champs obligatoires.");
                    return;
                }

                // Rechercher les coordonnées de l'adresse
                let lat, lng;
                const suggestions = await searchAddress(address);

                if (suggestions.length > 0) {
                    lat = suggestions[0].lat;
                    lng = suggestions[0].lng;
                } else {
                    showError("Adresse non trouvée. Utilisation des coordonnées de la pharmacie par défaut.");
                    lat = pharmacy.lat;
                    lng = pharmacy.lng;
                }

                // Ajouter la commande
                addOrder(customerName, address, lat, lng, phone, priority);

                // Réinitialiser le formulaire
                addOrderForm.reset();
                document.getElementById('addressSuggestions').style.display = 'none';
            });

            // Autocomplétion des adresses
            const addressInput = document.getElementById('address');
            if (!addressInput) {
                console.error("Champ address non trouvé.");
                return;
            }

            addressInput.addEventListener('input', async (e) => {
                const query = e.target.value.trim();
                if (query.length < 3) {
                    document.getElementById('addressSuggestions').style.display = 'none';
                    return;
                }

                const suggestions = await searchAddress(query);
                const container = document.getElementById('addressSuggestions');

                if (!container) {
                    console.error("Conteneur addressSuggestions non trouvé.");
                    return;
                }

                if (suggestions.length > 0) {
                    container.innerHTML = suggestions.map(s => {
                        const escapedAddress = s.address.replace(/'/g, "\\'");
                        return `
                            <div class="list-group-item" onclick="selectAddress('${escapedAddress}', ${s.lat}, ${s.lng})">
                                ${s.address}
                            </div>
                        `;
                    }).join('');
                    container.style.display = 'block';
                } else {
                    container.style.display = 'none';
                }
            });

            // Optimiser la tournée
            const optimizeBtn = document.getElementById('optimizeRouteBtn');
            if (!optimizeBtn) {
                console.error("Bouton optimizeRouteBtn non trouvé.");
                return;
            }

            optimizeBtn.addEventListener('click', optimizeRoute);

            // Masquer les suggestions en cliquant ailleurs
            document.addEventListener('click', (e) => {
                const addressSuggestions = document.getElementById('addressSuggestions');
                if (addressSuggestions && !e.target.closest('#address') && !e.target.closest('#addressSuggestions')) {
                    addressSuggestions.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
