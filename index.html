<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy Delivery Réunion - Optimisation de tournées</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Bootstrap pour le design -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Notre CSS personnalisé -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Barre latérale (liste des commandes) -->
            <div class="col-md-4 sidebar">
                <h1 class="text-center my-4">
                    <i class="fas fa-truck-medical"></i> Pharmacy Delivery Réunion
                </h1>
                <div class="card mb-4">
                    <div class="card-header bg-primary text-white">
                        <h5><i class="fas fa-plus"></i> Ajouter une commande</h5>
                    </div>
                    <div class="card-body">
                        <form id="addOrderForm">
                            <div class="mb-3">
                                <label for="customerName" class="form-label">Nom du client</label>
                                <input type="text" class="form-control" id="customerName" required>
                            </div>
                            <div class="mb-3">
                                <label for="address" class="form-label">Adresse</label>
                                <input type="text" class="form-control" id="address" required>
                                <div id="addressSuggestions" class="list-group mt-2" style="display: none;"></div>
                            </div>
                            <div class="mb-3">
                                <label for="phone" class="form-label">Téléphone (optionnel)</label>
                                <input type="tel" class="form-control" id="phone">
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="priority">
                                <label class="form-check-label" for="priority">Commande urgente</label>
                            </div>
                            <button type="submit" class="btn btn-success w-100">
                                <i class="fas fa-save"></i> Ajouter
                            </button>
                        </form>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                        <h5><i class="fas fa-list"></i> Commandes en attente</h5>
                        <button id="optimizeRouteBtn" class="btn btn-sm btn-light">
                            <i class="fas fa-route"></i> Optimiser la tournée
                        </button>
                    </div>
                    <div class="card-body">
                        <div id="ordersList" class="orders-container"></div>
                    </div>
                </div>
            </div>

            <!-- Carte (partie principale) -->
            <div class="col-md-8 map-container">
                <div id="map"></div>
                <div id="routeSteps" class="route-steps">
                    <h5><i class="fas fa-map-marked-alt"></i> Itinéraire optimisé</h5>
                    <div id="stepsList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal pour les erreurs -->
    <div class="modal fade" id="errorModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">Erreur</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="errorMessage"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Nos scripts -->
    <script src="data.js"></script>
    <script src="map.js"></script>
    <script src="app.js"></script>
</body>
</html>
